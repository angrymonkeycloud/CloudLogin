name: Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    name: CloudLogin tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore CloudLogin.Tests/CloudLogin.Tests.csproj

      - name: Test
        run: dotnet test CloudLogin.Tests/CloudLogin.Tests.csproj --configuration Release --no-restore
